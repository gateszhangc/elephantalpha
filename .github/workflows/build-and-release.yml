name: Build And Release

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: elephantalpha-release
  cancel-in-progress: true

env:
  IMAGE_NAME: registry.144.91.77.245.sslip.io/elephantalpha
  K8S_NAMESPACE: elephantalpha
  BUILD_JOB_PREFIX: build-elephantalpha

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure build namespace exists
        run: |
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create temporary registry auth secret
        run: |
          printf '%s' "${{ secrets.REGISTRY_DOCKERCONFIGJSON_B64 }}" | base64 --decode > /tmp/.dockerconfigjson
          kubectl -n "$K8S_NAMESPACE" create secret generic build-registry-auth \
            --from-file=.dockerconfigjson=/tmp/.dockerconfigjson \
            --type=kubernetes.io/dockerconfigjson \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create temporary git auth secret
        run: |
          kubectl -n "$K8S_NAMESPACE" create secret generic build-git-auth \
            --from-literal=token='${{ github.token }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Start K8s build job
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          BUILD_JOB_NAME="${BUILD_JOB_PREFIX}-${GITHUB_RUN_ID}"
          cat <<EOF >/tmp/build-job.yaml
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${BUILD_JOB_NAME}
            namespace: ${K8S_NAMESPACE}
          spec:
            ttlSecondsAfterFinished: 600
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                volumes:
                  - name: workspace
                    emptyDir: {}
                  - name: docker-config
                    secret:
                      secretName: build-registry-auth
                      items:
                        - key: .dockerconfigjson
                          path: config.json
                initContainers:
                  - name: checkout
                    image: alpine/git:2.45.2
                    env:
                      - name: GITHUB_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: build-git-auth
                            key: token
                    command: ["/bin/sh", "-lc"]
                    args:
                      - |
                        set -eu
                        git clone "https://x-access-token:\${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /workspace
                        cd /workspace
                        git fetch --depth=1 origin "${GITHUB_SHA}"
                        git checkout --detach "${GITHUB_SHA}"
                    volumeMounts:
                      - name: workspace
                        mountPath: /workspace
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:v1.23.2-debug
                    args:
                      - --context=dir:///workspace
                      - --dockerfile=/workspace/Dockerfile
                      - --destination=${IMAGE_NAME}:${IMAGE_TAG}
                      - --snapshot-mode=redo
                      - --use-new-run
                    volumeMounts:
                      - name: workspace
                        mountPath: /workspace
                      - name: docker-config
                        mountPath: /kaniko/.docker
          EOF
          kubectl apply -f /tmp/build-job.yaml
          echo "BUILD_JOB_NAME=${BUILD_JOB_NAME}" >> "$GITHUB_ENV"

      - name: Wait for build job
        run: |
          kubectl -n "$K8S_NAMESPACE" wait --for=condition=complete --timeout=30m "job/${BUILD_JOB_NAME}"

      - name: Print build logs
        if: always()
        run: |
          if [[ -n "${BUILD_JOB_NAME:-}" ]]; then
            kubectl -n "$K8S_NAMESPACE" logs "job/${BUILD_JOB_NAME}" -c checkout --tail=-1 || true
            kubectl -n "$K8S_NAMESPACE" logs "job/${BUILD_JOB_NAME}" -c kaniko --tail=-1 || true
          fi

      - name: Cleanup build resources
        if: always()
        run: |
          rm -f /tmp/.dockerconfigjson /tmp/build-job.yaml
          if [[ -n "${BUILD_JOB_NAME:-}" ]]; then
            kubectl -n "$K8S_NAMESPACE" delete job "${BUILD_JOB_NAME}" --ignore-not-found=true
          fi
          kubectl -n "$K8S_NAMESPACE" delete secret build-git-auth --ignore-not-found=true
          kubectl -n "$K8S_NAMESPACE" delete secret build-registry-auth --ignore-not-found=true

  update-gitops-tag:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tag
        env:
          RELEASE_BRANCH: ${{ github.ref_name }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          branch = os.environ["RELEASE_BRANCH"]
          overlays = {
              "main": "prod",
              "staging": "staging",
          }
          overlay = overlays.get(branch)
          if overlay is None:
              raise SystemExit(f"unsupported release branch: {branch}")

          path = Path(f"deploy/k8s/overlays/{overlay}/kustomization.yaml")
          content = path.read_text()
          updated, count = re.subn(
              r"(^\s*newTag:\s*).*$",
              lambda match: f"{match.group(1)}{os.environ['IMAGE_TAG']}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("expected a single newTag entry in kustomization.yaml")
          path.write_text(updated)
          PY

      - name: Commit manifest update
        env:
          RELEASE_BRANCH: ${{ github.ref_name }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          case "$RELEASE_BRANCH" in
            main)
              MANIFEST_PATH="deploy/k8s/overlays/prod/kustomization.yaml"
              ;;
            staging)
              MANIFEST_PATH="deploy/k8s/overlays/staging/kustomization.yaml"
              ;;
            *)
              echo "unsupported release branch: $RELEASE_BRANCH"
              exit 1
              ;;
          esac

          if git diff --quiet -- "$MANIFEST_PATH"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_PATH"
          git commit -m "chore: release ${IMAGE_TAG} [skip ci]"
          git push origin "HEAD:${RELEASE_BRANCH}"
